<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="13" fill="#050A05" />
  <!-- Digital rain: three staggered columns, bright leading head fading up the trail -->
  <g>
    <!-- column 1 -->
    <rect x="9" y="6" width="10" height="9" rx="2" fill="#02A02C" />
    <rect x="9" y="18" width="10" height="9" rx="2" fill="#00E83A" />
    <rect x="9" y="30" width="10" height="9" rx="2" fill="#5BFF79" />
    <rect x="9" y="42" width="10" height="9" rx="2" fill="#E4FFE6" />
    <!-- column 2 -->
    <rect x="27" y="30" width="10" height="9" rx="2" fill="#02A02C" />
    <rect x="27" y="42" width="10" height="9" rx="2" fill="#00E83A" />
    <rect x="27" y="54" width="10" height="9" rx="2" fill="#E4FFE6" />
    <!-- column 3 -->
    <rect x="45" y="6" width="10" height="9" rx="2" fill="#00E83A" />
    <rect x="45" y="18" width="10" height="9" rx="2" fill="#5BFF79" />
    <rect x="45" y="30" width="10" height="9" rx="2" fill="#E4FFE6" />
  </g>
</svg>
